name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  sast_sonar_scan:
    name: SAST and SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_and_push_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sast_sonar_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t medaminehlali/gitops-sonarqube-aks-pipeline:1 .

      - name: Push Docker Image
        run: docker push medaminehlali/gitops-sonarqube-aks-pipeline:1
  scan_container_image:
    name: Scan Container Image
    runs-on: ubuntu-latest
    needs: build_and_push_docker

    steps:
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: medaminehlali/gitops-sonarqube-aks-pipeline:1
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          